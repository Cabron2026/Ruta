<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ruta</title>
<style>
  html, body { margin: 0; height: 100%; background: #ECE8E8; }
</style>
<script>
  (function () {
    /*
      Device routing — runs once on load, never reacts to live resize.

      Priority:
      1) Telegram Mini App → always mobile.html
      2) pointer: coarse = touch device:
           - phone  (screen.width <= 500px in portrait) → mobile.html
           - tablet (screen.width 501–1100px, portrait)  → tablet.html
           - tablet landscape or large touch screen       → desktop.html
      3) mouse/trackpad → desktop.html
    */

    function isTelegramWebApp() {
      try { return !!(window.Telegram && window.Telegram.WebApp); }
      catch (e) { return false; }
    }

    function chooseTarget() {
      if (isTelegramWebApp()) return 'mobile.html';

      var isTouch = false;
      try {
        isTouch = window.matchMedia('(pointer: coarse)').matches ||
                  window.matchMedia('(hover: none)').matches;
      } catch (e) {}

      if (!isTouch) return 'desktop.html';

      // touch device — distinguish phone vs tablet vs landscape
      var isLandscape = false;
      try { isLandscape = window.matchMedia('(orientation: landscape)').matches; }
      catch (e) { isLandscape = window.innerWidth > window.innerHeight; }

      // use screen.width (physical, not affected by browser window resize)
      var sw = Math.min(screen.width, screen.height); // shorter side = portrait width
      // phone: portrait width ≤ 500px (iPhone SE=375, iPhone 16 Plus=430)
      // tablet: portrait width 501–1100px (iPad mini=768, iPad Pro=1024, Tab S8=800)

      if (isLandscape) {
        // landscape touch: tablets go desktop layout, phones stay mobile
        return sw <= 500 ? 'mobile.html' : 'desktop.html';
      }

      return sw <= 500 ? 'mobile.html' : 'tablet.html';
    }

    window.location.replace(chooseTarget());
  })();
</script>
</head>
<body>
  <noscript>
    <div style="font-family:-apple-system,sans-serif;padding:2rem;text-align:center">
      <p>JavaScript is required for automatic redirection.</p>
      <a href="desktop.html">Desktop</a> ·
      <a href="tablet.html">Tablet</a> ·
      <a href="mobile.html">Mobile</a>
    </div>
  </noscript>
</body>
</html>
